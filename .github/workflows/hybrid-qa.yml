name: Hybrid QA

on:
  pull_request:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  id-token: write

concurrency:
  group: hybrid-qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      template_api: ${{ steps.filter.outputs.template_api }}
      detection_ai: ${{ steps.filter.outputs.detection_ai }}
      workspace: ${{ steps.filter.outputs.workspace }}
      fill_links: ${{ steps.filter.outputs.fill_links }}
      signing: ${{ steps.filter.outputs.signing }}
      billing: ${{ steps.filter.outputs.billing }}
      shared_runtime: ${{ steps.filter.outputs.shared_runtime }}
      playwright_safe: ${{ steps.filter.outputs.playwright_safe }}
      frontend_lint: ${{ steps.filter.outputs.frontend_lint }}
      frontend_lint_files: ${{ steps.filter.outputs.frontend_lint_files }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v4
        with:
          list-files: shell
          filters: |
            template_api:
              - '.github/workflows/**'
              - 'backend/api/routes/template_api*.py'
              - 'backend/firebaseDB/template_api_endpoint_database.py'
              - 'backend/services/template_api_service.py'
              - 'backend/test/integration/test_template_api_integration.py'
              - 'frontend/**/template_api*'
            detection_ai:
              - 'backend/api/routes/ai.py'
              - 'backend/api/routes/detection.py'
              - 'backend/detection/**'
              - 'backend/fieldDetecting/**'
              - 'backend/services/detection_service.py'
              - 'backend/services/task_auth_service.py'
              - 'backend/test/integration/test_detection_rename_saved_form_flow.py'
              - 'frontend/**/rename*'
              - 'frontend/**/schema*'
              - 'frontend/**/pipeline*'
            workspace:
              - 'backend/api/routes/groups.py'
              - 'backend/api/routes/profile.py'
              - 'backend/api/routes/saved_forms.py'
              - 'backend/api/routes/sessions.py'
              - 'backend/firebaseDB/group_database.py'
              - 'backend/firebaseDB/template_database.py'
              - 'backend/services/saved_form*'
              - 'backend/test/integration/test_workspace_bootstrap_integration.py'
              - 'frontend/**/workspace*'
              - 'frontend/**/saved*'
              - 'frontend/**/group*'
            fill_links:
              - 'backend/**/fill_link*'
              - 'backend/test/integration/test_fill_links_integration.py'
              - 'frontend/**/fill_link*'
            signing:
              - 'backend/**/signing*'
              - 'backend/test/integration/test_signing_foundation_integration.py'
              - 'frontend/**/signing*'
            billing:
              - 'backend/**/billing*'
              - 'backend/test/integration/test_billing_*'
              - 'frontend/**/billing*'
              - 'frontend/**/downgrade*'
            shared_runtime:
              - 'backend/api/middleware/**'
              - 'backend/firebaseDB/firebase_service.py'
              - 'backend/sessions/**'
              - 'backend/services/app_config.py'
              - 'frontend/src/App.tsx'
              - 'frontend/src/services/api.ts'
              - 'frontend/src/services/apiConfig.ts'
              - 'package.json'
              - 'frontend/package.json'
              - 'scripts/ci/**'
            playwright_safe:
              - '.github/workflows/**'
              - 'frontend/test/playwright/**'
              - 'frontend/src/testSupport/**'
            frontend_lint:
              - 'frontend/src/**/*.js'
              - 'frontend/src/**/*.jsx'
              - 'frontend/src/**/*.ts'
              - 'frontend/src/**/*.tsx'
              - 'frontend/src/**/*.mjs'
              - 'frontend/src/**/*.cjs'

  qa:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment: development
    needs:
      - changes
    env:
      DEV_WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER_DEV }}
      DEV_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}
      DEV_KEY_JSON: ${{ secrets.GCP_CREDENTIALS_JSON_DEV }}
      BACKEND_ENV_FILE_B64_DEV: ${{ secrets.BACKEND_ENV_FILE_B64_DEV }}
      FIREBASE_SERVICE_ACCOUNT_ID: ${{ secrets.GCP_SERVICE_ACCOUNT_DEV }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Install backend dependencies
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Authenticate to Google Cloud for hybrid QA
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.DEV_WIF_PROVIDER != '' && env.DEV_SERVICE_ACCOUNT != '' && env.DEV_WIF_PROVIDER || '' }}
          service_account: ${{ env.DEV_WIF_PROVIDER != '' && env.DEV_SERVICE_ACCOUNT != '' && env.DEV_SERVICE_ACCOUNT || '' }}
          credentials_json: ${{ ((env.DEV_WIF_PROVIDER == '' || env.DEV_SERVICE_ACCOUNT == '') && env.DEV_KEY_JSON) || '' }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Run hybrid QA pipeline
        env:
          CHANGED_FRONTEND_LINT_FILES: ${{ needs.changes.outputs.frontend_lint_files }}
          RUN_TEMPLATE_API: ${{ needs.changes.outputs.template_api }}
          RUN_DETECTION_AI: ${{ needs.changes.outputs.detection_ai }}
          RUN_WORKSPACE: ${{ needs.changes.outputs.workspace }}
          RUN_FILL_LINKS: ${{ needs.changes.outputs.fill_links }}
          RUN_SIGNING: ${{ needs.changes.outputs.signing }}
          RUN_BILLING: ${{ needs.changes.outputs.billing }}
          RUN_SHARED_RUNTIME: ${{ needs.changes.outputs.shared_runtime }}
          RUN_PLAYWRIGHT_SAFE: ${{ needs.changes.outputs.playwright_safe }}
        run: |
          set -euo pipefail

          restore_var() {
            local name="$1"
            local value="$2"
            if [[ -n "$value" ]]; then
              export "${name}=${value}"
            else
              unset "${name}"
            fi
          }

          saved_cloudsdk_core_project="${CLOUDSDK_CORE_PROJECT-}"
          saved_cloudsdk_project="${CLOUDSDK_PROJECT-}"
          saved_gcloud_project="${GCLOUD_PROJECT-}"
          saved_gcp_project="${GCP_PROJECT-}"
          saved_google_cloud_project="${GOOGLE_CLOUD_PROJECT-}"
          saved_google_application_credentials="${GOOGLE_APPLICATION_CREDENTIALS-}"
          saved_cloudsdk_auth_credential_file_override="${CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE-}"
          saved_google_gha_creds_path="${GOOGLE_GHA_CREDS_PATH-}"
          saved_firebase_service_account_id="${FIREBASE_SERVICE_ACCOUNT_ID-}"

          unset CLOUDSDK_CORE_PROJECT CLOUDSDK_PROJECT GCLOUD_PROJECT GCP_PROJECT GOOGLE_CLOUD_PROJECT
          unset GOOGLE_APPLICATION_CREDENTIALS CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE GOOGLE_GHA_CREDS_PATH
          unset FIREBASE_SERVICE_ACCOUNT_ID

          npm run test

          restore_var CLOUDSDK_CORE_PROJECT "${saved_cloudsdk_core_project}"
          restore_var CLOUDSDK_PROJECT "${saved_cloudsdk_project}"
          restore_var GCLOUD_PROJECT "${saved_gcloud_project}"
          restore_var GCP_PROJECT "${saved_gcp_project}"
          restore_var GOOGLE_CLOUD_PROJECT "${saved_google_cloud_project}"
          restore_var GOOGLE_APPLICATION_CREDENTIALS "${saved_google_application_credentials}"
          restore_var CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE "${saved_cloudsdk_auth_credential_file_override}"
          restore_var GOOGLE_GHA_CREDS_PATH "${saved_google_gha_creds_path}"
          restore_var FIREBASE_SERVICE_ACCOUNT_ID "${saved_firebase_service_account_id}"

          bash scripts/ci/run_frontend_changed_lint.sh
          npm run frontend:build:prod
          bash scripts/ci/run_targeted_backend_suites.sh

          run_playwright="false"
          if [[ "${RUN_PLAYWRIGHT_SAFE}" == "true" || "${RUN_TEMPLATE_API}" == "true" || "${RUN_DETECTION_AI}" == "true" || "${RUN_WORKSPACE}" == "true" || "${RUN_FILL_LINKS}" == "true" || "${RUN_SIGNING}" == "true" || "${RUN_SHARED_RUNTIME}" == "true" ]]; then
            run_playwright="true"
          fi

          if [[ "${run_playwright}" != "true" ]]; then
            echo "No real targeted Playwright suites selected for this change set."
            exit 0
          fi

          active_account="$(gcloud auth list --filter=status:ACTIVE --format='value(account)' | head -n 1)"
          if [[ -z "$active_account" ]]; then
            echo "Missing Google Cloud auth for seeded real Playwright fixtures. Configure dev WIF or service-account key secrets." >&2
            exit 1
          fi
          echo "Authenticated as ${active_account}"

          if [[ -z "${BACKEND_ENV_FILE_B64_DEV}" ]]; then
            echo "Missing BACKEND_ENV_FILE_B64_DEV secret in the development environment." >&2
            exit 1
          fi
          mkdir -p env
          printf '%s' "${BACKEND_ENV_FILE_B64_DEV}" | base64 --decode > env/backend.dev.env
          cat <<'EOF' >> env/backend.dev.env
          FIREBASE_CREDENTIALS_SECRET=
          FIREBASE_CREDENTIALS_PROJECT=
          GMAIL_CLIENT_SECRET_SECRET=
          GMAIL_REFRESH_TOKEN_SECRET=
          GMAIL_SECRETS_PROJECT=
          FILL_LINK_REQUIRE_RECAPTCHA=false
          OPENAI_RENAME_REMAP_MODE=local
          EOF

          npx playwright install --with-deps chromium

          nohup npm run backend:dev > /tmp/dullypdf-backend.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:8000/api/health >/dev/null; then
              break
            fi
            sleep 2
          done
          if ! curl --silent --fail http://127.0.0.1:8000/api/health >/dev/null; then
            echo "Backend dev server did not become ready in time." >&2
            cat /tmp/dullypdf-backend.log >&2 || true
            exit 1
          fi

          bash scripts/use-frontend-env.sh dev
          printf '\nVITE_FILL_LINK_REQUIRE_RECAPTCHA=false\n' >> frontend/.env.local
          nohup bash -lc 'cd frontend && npm run dev -- --host 127.0.0.1 --strictPort' > /tmp/dullypdf-frontend.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl --silent --fail http://127.0.0.1:5173/ >/dev/null; then
              break
            fi
            sleep 2
          done
          if ! curl --silent --fail http://127.0.0.1:5173/ >/dev/null; then
            echo "Frontend dev server did not become ready in time." >&2
            cat /tmp/dullypdf-frontend.log >&2 || true
            exit 1
          fi

          bash scripts/ci/run_targeted_playwright_suites.sh

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hybrid-qa-playwright-artifacts
          path: |
            output/playwright/**
            /tmp/dullypdf-frontend.log
            /tmp/dullypdf-backend.log
          if-no-files-found: ignore
